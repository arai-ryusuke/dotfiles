onboarding = false
[keys]
prefix = "ctrl+space"
previous_tab = "prefix+h"
next_tab = "prefix+l"
new_tab = "prefix+n"
focus_pane_left = "prefix+left"
focus_pane_right = "prefix+right"

[ui.toast]
delivery = "off"

# ポップアップでvimを開き、保存内容をフォーカス中ペイン（claude等）の入力欄へ送る
# 送信はしない（Enterはユーザーが押す）。実体は ~/.dotfiles/bin/herdr-prompt-vim.sh
[[keys.command]]
key = "prefix+i"
type = "popup"
command = "bash \"$HOME/.dotfiles/bin/herdr-prompt-vim.sh\""
description = "compose prompt in vim"
width = "80%"
height = "80%"

[ui]
show_agent_labels_on_pane_borders = true
agent_panel_sort = "spaces"

[experimental]
pane_history = false

[ui.sound]
enabled = true

[theme]
name = "dracula"
auto_switch = false

# セカンダリテキスト（サイドバーのタブ名・$model等）の明度アップ
# テーマ標準のmuted色は暗背景とのコントラストが低く2型3色覚では見づらいため、
# 色相ではなく明度を上げて白寄りにする（テーマを替えてもこの上書きは共通で効く）
[theme.custom]
subtext0 = "#e8eaf6"
overlay1 = "#e8eaf6"
overlay0 = "#ffffff"

# サイドバーのエージェント行: 1行目=アイコン+タブ名、2行目=ステータス+モデル名
# デフォルトは [["state_icon", "workspace", "tab"], ["agent"]]
# $model はカスタムトークン（~/.claude/hooks/herdr-model-token.sh が報告）
# tabはデフォルトだとoverlay0色+端末DIM属性で暗く描かれるため、
# トークン個別スタイル（0.7.5+）でfgを明示しdimを外して明度を確保する
[ui.sidebar.agents]
row_gap = 1
rows = [["state_icon", { token = "tab", fg = "#e8eaf6", dim = false }], ["state_text", "$model"]]
